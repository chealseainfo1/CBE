<script>
let testData = [];
let examData = [];

document.getElementById("testFile").addEventListener("change", e => handleFile(e, "test"));
document.getElementById("examFile").addEventListener("change", e => handleFile(e, "exam"));

function handleFile(event, type) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    if (type === "test") testData = json;
    if (type === "exam") examData = json;
  };

  reader.readAsArrayBuffer(file);
}

function normalizeKey(row) {
  const key = row["matric number"] || row["Matric Number"] || row["matric"] || row["Matric"];
  return key ? String(key).trim() : "";
}

function validateMatricNumbers(testArr, examArr) {
  const issues = [];

  const testSet = new Set();
  const examSet = new Set();

  testArr.forEach(r => {
    const k = normalizeKey(r);
    if (!k) issues.push("Empty matric number found in TEST file");
    if (testSet.has(k)) issues.push("Duplicate matric in TEST: " + k);
    testSet.add(k);
  });

  examArr.forEach(r => {
    const k = normalizeKey(r);
    if (!k) issues.push("Empty matric number found in EXAM file");
    if (examSet.has(k)) issues.push("Duplicate matric in EXAM: " + k);
    examSet.add(k);
  });

  // cross-check missing entries
  testSet.forEach(k => {
    if (!examSet.has(k)) issues.push("Missing in EXAM file: " + k);
  });

  examSet.forEach(k => {
    if (!testSet.has(k)) issues.push("Missing in TEST file: " + k);
  });

  return issues;
}

function mergeResults() {
  const issues = validateMatricNumbers(testData, examData);

  if (issues.length > 0) {
    alert("Validation issues found:\n\n" + issues.join("\n"));
    if (!confirm("Continue merging anyway?")) return;
  }

  const map = new Map();

  testData.forEach(r => {
    const key = normalizeKey(r);
    if (!key) return;

    if (!map.has(key)) map.set(key, {});
    map.get(key).serial = r["serial number"] || r["Serial Number"] || "";
    map.get(key).matric = key;
    map.get(key).test = r["test score"] || r["Test Score"] || 0;
  });

  examData.forEach(r => {
    const key = normalizeKey(r);
    if (!key) return;

    if (!map.has(key)) map.set(key, {});
    map.get(key).serial = map.get(key).serial || r["serial number"] || r["Serial Number"] || "";
    map.get(key).matric = key;
    map.get(key).exam = r["exam score"] || r["Exam Score"] || 0;
  });

  const output = Array.from(map.values()).map(r => ({
    "Serial Number": r.serial,
    "Matric Number": r.matric,
    "Test Score": r.test,
    "Exam Score": r.exam
  }));

  const worksheet = XLSX.utils.json_to_sheet(output);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Results");

  XLSX.writeFile(workbook, "merged_results.xlsx");
}
</script>
